        <script>

            function calculateTax(cost, taxPercent = 0) {
                console.log(cost * taxPercent)
            }

            calculateTax(10000, 0.2);
            calculateTax(10000);

            console.log(convertToFahrenheit(25));

            function convertToFahrenheit(celsius) {
                return (celsius * (9 / 5)) + 32;
            }

            console.log(convertToCelsius(86));

            function convertToCelsius(fahrenheit) {
                return (fahrenheit - 32) * (5 / 9);
            }

            function convertTemperature(degrees, unit) {
                if (unit === 'F') {
                    let degree = convertToCelsius(degrees);
                    return degree + 'C';
                } else if (unit === 'C') {
                    let degree = convertToFahrenheit(degrees);
                    return degree + 'F';
                } else {
                    'Unit or degrees are not provided or incorrect.'
                }
            }

            console.log(convertTemperature(25, 'C'));
            console.log(convertTemperature(86, 'F'));

            function convertLength(length, from, to) {
                const availableUnits = ['km', 'ml', 'ft'];

                const fromvalid = availableUnits.includes(from);
                const toValid = availableUnits.includes(to);

                if (!fromvalid && !toValid) {
                    return `Invalid Unit: ${from}; ${to}`;
                }
                
                if (!fromvalid) {
                    return `Invalid Unit: ${from}`;
                }
                
                if (!toValid) {
                    return `Invalid Unit: ${to}`;
                }

                if (from === 'ml') {
                    if (to === 'km') {
                        return length * 1.6 + ' km';
                    } else if (to === 'ft') {
                        return length * 5280 + ' ft';
                    }
                } else if (from === 'km') {
                    if (to === 'ml') {
                        return length / 1.6 + ' miles';
                    } else if (to === 'ft') {
                        return length * 3281 + ' ft';
                    }
                } else if (from === 'ft') {
                    if (to === 'km') {
                        return length / 3281 + ' km';
                    } else if (to === 'ml') {
                        return length / 5280 + ' ft';
                    }
                } else if (from === to) {
                    return length + ` ${from}`;
                }
            }

            console.log(convertLength(100, 'km', 'ml'));
            console.log(convertLength(60, 'ml', 'km'));
            console.log(convertLength(60, 'ml', 'ml'));
            console.log(convertLength(60, 'kg', 'gr'));
        </script>
    </body>
