<!DOCTYPE html>
<html>
    <head>
        <title>Objects</title>
    </head>
    <body>
        <script>
            const product = {
                name: 'socks',
                price: 100
            };

            console.log(product);
            console.log(product.name);
            console.log(product.price);

            product.name = 'something else';

            console.log(product.name);

            product.newValue = 'value';

            console.log(product);
        </script>
    </body>
</html>
