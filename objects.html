<!DOCTYPE html>
<html>
    <head>
        <title>Objects</title>
    </head>
    <body>
        <script>
            const product = {
                name: 'socks',
                price: 100
            };

            console.log(product);
            console.log(product.name);
            console.log(product.price);

            product.name = 'something else';

            console.log(product.name);

            product.newValue = 'value';

            console.log(product);

            const product2 = {
                name: 'product2',
                age: 12,
                'delivery-time': '12 days',
                rating: {
                    stars: 4.3,
                    count: 87
                },

                fun: function function1() {
                    console.log('this string is inside the object.');
                }
            };

            console.log(product2.name);
            console.log(product2['name']);
            console.log(product2['delivery-time']);
            // console.log(product2.delivery-time); // this code will return error;
            console.log(product2.rating.count);
            product2.fun();

            console.log(JSON.stringify(product2));
            
            const jsonString = JSON.stringify(product2);

            console.log(JSON.parse(jsonString));

            console.log('hello'.length);
            console.log('hello'.toUpperCase());

            const obj1 = {
                message: 'hello'
            };

            const obj2 = obj1;

            obj1.message = 'Good Job!';

            console.log(obj1);
            console.log(obj2);

            const obj3 = {
                messsage: 'Good Job!'
            };

            console.log(obj3 === obj1);
            console.log(obj2 === obj1); // >> true (because the objects have the same reference)

            const object4 = {
                message: 'Hello World!',
                price: 7.99
            };
            const { message, price } = object4;

            console.log(message);
            console.log(price);

            const obj5 = {
                // message: message,
                message,
                method() {
                    console.log('method');
                }
            };

            console.log(obj5);
            obj5.method();
        </script>
    </body>
</html>
