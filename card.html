<!DOCTYPE html>
<html>
    <head>
        <title>Card</title>
    </head>
    <body>
        <button onClick="
            console.log(`Card quantity: ${cardQuantity}`);
        ">Show quantity</button>
        <button onClick="
            addQuantity(1);
        ">Add to card</button>
        <button onclick="
            addQuantity(2);
        ">+2</button>
        <button onclick="
            addQuantity(5);
        ">+5</button>
        <button onclick="
            resetQuantity();
        ">Reset</button>

        <script>
            let cardQuantity = 0;

            function addQuantity(number) {
                if (cardQuantity + number > 25) {
                    alert('The cart is full!');
                    return;
                }

                cardQuantity += number;

                if (number === 1) {
                    console.log(`Item was added. Total: ${cardQuantity}`);
                } else if (number > 1) {
                    console.log(`${number} items ware added. Total: ${cardQuantity}`);
                }
            }

            function resetQuantity() {
                cardQuantity = 0;
                console.log(`Item was removed. Total: ${cardQuantity}`);
            }
        </script>
    </body>
</html>
